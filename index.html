<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Baitwell</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .hero {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #123 0%, #000 70%);
    }

    .content {
      text-align: center;
      z-index: 5;
    }

    h1 {
      font-size: 90px;
      margin: 0;
      letter-spacing: -6px;
    }

    p {
      font-size: 20px;
    }

    button {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="content">
      <h1>BAITWELL</h1>
      <p>K.Fisha Presents</p>
      <p>Every classic starts with good bait.</p>
      <button>Board Vessel</button>
    </div>
  </div>

</body>
</html>
