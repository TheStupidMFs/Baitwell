<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baitwell | K.Fisha</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="hero">
    <div class="ocean-bg"></div>
    <div class="moon-wrap">
      <img src="assets/images/moon.png" class="moon" alt="Moon" />
    </div>

    <div class="cloud cloud-one"></div>
    <div class="cloud cloud-two"></div>
    <div class="fog fog-one"></div>
    <div class="fog fog-two"></div>
    <div class="grain"></div>

    <section class="scene">
      <img src="assets/images/baitwell-boat.png" class="boat" alt="Baitwell boat" />

      <div class="content">
        <img src="assets/images/baitwell-logo.png" class="logo" alt="Baitwell logo" />
        <p class="eyebrow">K.Fisha Presents</p>
        <p class="tagline">Every classic starts with good bait.</p>
        <button id="boardBtn">Board Vessel</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
